<!doctype html>
<html lang="en">
  <head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TLYT2KC39B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TLYT2KC39B');

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>CWSimon Morse Trainer</title>
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <meta name="title" content="CWSimon Morse Trainer" />
    <meta name="description" content="CWSimon standalone Morse practice" />
    <meta name="author" content="Project TouCans" />
    <meta name="theme-color" content="#222" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: sans-serif;
        background-color: #111;
        color: #fff;
      }

      #metdivid {
        padding: 1rem;
        overflow-y: auto;
        min-height: 60vh;
      }

      #elements {
        position: fixed;
        top: 65%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 170px;
        z-index: 9999;
        display: flex;
      }

      #elements > div {
        border: 2px solid #000;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2em;
      }

      #\31,
      #\33 {
        flex: 1;
      }

      #\32 {
        flex: 0 0 auto;
        width: 18%;
      }

      #console {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        font-size: 0.85rem;
        padding: 0.5rem;
        box-sizing: border-box;
      }

      #settingsGearBtn {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 10000;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #555;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        font-size: 1.4rem;
        color: #ccc;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
      }

      #settingsPanel {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 10001;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        overflow-y: auto;
        padding: 60px 1rem 1rem;
        box-sizing: border-box;
      }

      #settingsPanel.open {
        display: block;
      }

      #settingsCloseBtn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: transparent;
        border: 1px solid #555;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        font-size: 1.4rem;
        color: #ccc;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
      }

      #settingsPanelContent {
        max-width: 400px;
        margin: 0 auto;
      }

      #settingsPanelContent h2 {
        margin-top: 0;
        font-size: 1.3rem;
      }

      .speed-control {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .speed-control label {
        flex: 1;
        font-size: 0.95rem;
      }

      .speed-control .ctrl-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .speed-control button {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
        background: #333;
        color: #fff;
        border: 1px solid #555;
        border-radius: 6px;
        cursor: pointer;
        touch-action: manipulation;
      }

      .speed-control .value {
        min-width: 3.5rem;
        text-align: center;
        font-size: 1.1rem;
        font-variant-numeric: tabular-nums;
      }

      #morseOverlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30vw;
        font-weight: bold;
        color: #fff;
        pointer-events: none;
        z-index: 9998;
        opacity: 0;
        transition: opacity 0.4s ease-out;
      }

      #morseOverlay.visible {
        opacity: 1;
        transition: none;
      }

      #loseModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 10002;
        background: rgba(0, 0, 0, 0.85);
        align-items: center;
        justify-content: center;
      }

      #loseModal.visible {
        display: flex;
      }

      #loseModalContent {
        text-align: center;
        padding: 2rem;
      }

      #loseModalContent p {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
      }

      #loseRestartBtn,
      #loseCancelBtn {
        font-size: 1.2rem;
        padding: 0.8rem 2rem;
        background: #333;
        color: #fff;
        border: 1px solid #555;
        border-radius: 8px;
        cursor: pointer;
        touch-action: manipulation;
      }

      #loseCancelBtn {
        margin-left: 1rem;
      }

      #presetTextBtn {
        margin-top: 0.8rem;
        background: #1a0a2e;
        color: #c9a0dc;
        border: 2px solid #6b3fa0;
        border-radius: 8px;
        padding: 0.8rem 1.5rem;
        font-size: 1rem;
        cursor: pointer;
        touch-action: manipulation;
      }

      .preset-text-section {
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid #333;
      }

      .preset-text-section h3 {
        margin: 0 0 0.5rem;
        font-size: 1.1rem;
        color: #c9a0dc;
      }

      .preset-text-section p {
        font-size: 0.85rem;
        color: #999;
        margin: 0 0 0.5rem;
      }

      .preset-text-section textarea {
        width: 100%;
        min-height: 100px;
        background: #1a0a2e;
        color: #e0d0f0;
        border: 1px solid #6b3fa0;
        border-radius: 6px;
        padding: 0.5rem;
        font-family: sans-serif;
        font-size: 0.9rem;
        resize: vertical;
        box-sizing: border-box;
      }

      #presetProgress {
        position: fixed;
        top: 60px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 1rem;
        color: #c9a0dc;
        background: rgba(26, 10, 46, 0.95);
        padding: 0.4rem 0.5rem;
        z-index: 9997;
        display: none;
      }

      #presetProgress.visible {
        display: block;
      }

      #ravenAd {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 10003;
        background: rgba(10, 0, 20, 0.95);
        align-items: center;
        justify-content: center;
        flex-direction: column;
        text-align: center;
        color: #c9a0dc;
      }

      #ravenAd.visible {
        display: flex;
      }

      #ravenAd .raven-title {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      #ravenAd .raven-quote {
        font-size: 2rem;
        font-weight: bold;
        color: #fff;
        margin-bottom: 0.5rem;
      }

      #ravenAd .raven-wpm {
        font-size: 0.8rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <img
        width="100%"
        src="./toucs_banner.jpg"
        alt="Project Toucans banner showing a friendly toucan, propagation arcs, and a ham radio by the sea."
      />
      <h2>Project TouCans CWSimon</h2>
      <p>Use the virtual paddle (1/3) as an iambic keyer (dit/dah.)</p>
      <button id="startGameButton" type="button">Start Game</button>
      <button id="presetTextBtn" type="button">Practice Text</button>
    </div>

    <div>
      <input hidden type="text" id="inetAddress" placeholder="e.g., 192.168.1.100" />
      <div id="metdivid"></div>
    </div>

    <div id="elements" class="elements">
      <div id="1">1</div>
      <div id="2">2</div>
      <div id="3">3</div>
    </div>

    <div id="morseOverlay"></div>

    <div id="loseModal">
      <div id="loseModalContent">
        <p>You completed <span id="loseRoundsCount">0</span> rounds</p>
        <p id="loseProgressMsg"></p>
        <p id="loseProgressSeq" style="font-size: 2rem; letter-spacing: 0.3em;"></p>
        <button id="loseReplayBtn" type="button">Replay My Input</button>
        <button id="loseRestartBtn" type="button">Play Again?</button>
        <button id="loseCancelBtn" type="button">Back to Menu</button>
      </div>
    </div>

    <div id="presetProgress"></div>

    <div id="ravenAd">
      <div class="raven-title">Quoth the Raven</div>
      <div class="raven-quote">Nevermore</div>
      <div class="raven-wpm">Listening at 24 WPM</div>
    </div>

    <div id="console" class="console"></div>

    <button id="settingsGearBtn" type="button" aria-label="Open settings">&#9881;</button>

    <div id="settingsPanel">
      <button id="settingsCloseBtn" type="button" aria-label="Close settings">&#10005;</button>
      <div id="settingsPanelContent">
        <h2>Settings</h2>

        <div class="speed-control">
          <label>WPM</label>
          <div class="ctrl-group">
            <button id="wpmMinus" type="button" aria-label="Decrease WPM">&minus;</button>
            <span id="wpmValue" class="value">8</span>
            <button id="wpmPlus" type="button" aria-label="Increase WPM">+</button>
          </div>
        </div>

        <div class="speed-control">
          <label>Word gap (ms)</label>
          <div class="ctrl-group">
            <button id="wordGapMinus" type="button" aria-label="Decrease word gap">&minus;</button>
            <span id="wordGapValue" class="value">1050</span>
            <button id="wordGapPlus" type="button" aria-label="Increase word gap">+</button>
          </div>
        </div>

        <div class="speed-control">
          <label>Lose sound</label>
          <div class="ctrl-group">
            <button id="loseSoundToggle" type="button" aria-label="Toggle lose sound">On</button>
          </div>
        </div>

        <div class="speed-control">
          <label>tx haptics</label>
          <div class="ctrl-group">
            <button id="txHapticsToggle" type="button" aria-label="Toggle tx haptics">Off</button>
          </div>
        </div>

        <div class="speed-control">
          <label>Letter Overlay</label>
          <div class="ctrl-group">
            <button id="letterOverlayToggle" type="button" aria-label="Toggle letter overlay">On</button>
          </div>
        </div>

        <div class="preset-text-section">
          <h3>Text Practice</h3>
          <p>Practice Morse with poems or custom text. Default: The Raven by E.A. Poe</p>
          <textarea id="presetTextArea" aria-label="Preset text for practice"></textarea>
        </div>
      </div>
    </div>

    <script src="./cw_snippets.js"></script>
    <script src="./simon-game-logic.js"></script>
    <script src="./pt-cwsimon.js"></script>
  </body>
</html>
