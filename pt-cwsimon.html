<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>CSimon Morse Trainer</title>
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <meta name="title" content="CSimon Morse Trainer" />
    <meta name="description" content="CSimon standalone Morse practice" />
    <meta name="author" content="Project TouCans" />
    <meta name="theme-color" content="#222" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: sans-serif;
        background-color: #111;
        color: #fff;
      }

      #metdivid {
        padding: 1rem;
        overflow-y: auto;
        min-height: 60vh;
      }

      #elements {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 170px;
        z-index: 9999;
        display: flex;
      }

      #elements > div {
        border: 2px solid #000;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2em;
      }

      #\31,
      #\33 {
        flex: 1;
      }

      #\32 {
        flex: 0 0 auto;
        width: 18%;
      }

      #console {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        font-size: 0.85rem;
        padding: 0.5rem;
        box-sizing: border-box;
      }

      #settingsGearBtn {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 10000;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #555;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        font-size: 1.4rem;
        color: #ccc;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
      }

      #settingsPanel {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 10001;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        overflow-y: auto;
        padding: 60px 1rem 1rem;
        box-sizing: border-box;
      }

      #settingsPanel.open {
        display: block;
      }

      #settingsCloseBtn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: transparent;
        border: 1px solid #555;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        font-size: 1.4rem;
        color: #ccc;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
      }

      #settingsPanelContent {
        max-width: 400px;
        margin: 0 auto;
      }

      #settingsPanelContent h2 {
        margin-top: 0;
        font-size: 1.3rem;
      }

      .speed-control {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .speed-control label {
        flex: 1;
        font-size: 0.95rem;
      }

      .speed-control .ctrl-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .speed-control button {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
        background: #333;
        color: #fff;
        border: 1px solid #555;
        border-radius: 6px;
        cursor: pointer;
        touch-action: manipulation;
      }

      .speed-control .value {
        min-width: 3.5rem;
        text-align: center;
        font-size: 1.1rem;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <img
        width="100%"
        src="./toucs_banner.jpg"
        alt="Project Toucans banner showing a friendly toucan, propagation arcs, and a ham radio by the sea."
      />
      <h1>Welcome to Project TouCans CSimon Practice</h1>
      <p>Use the virtual paddles or the HALI key to practice iambic CW. Histograms and controls load below.</p>
      <button id="startGameButton" type="button">Start Game</button>
    </div>

    <div>
      <input hidden type="text" id="inetAddress" placeholder="e.g., 192.168.1.100" />
      <div id="metdivid"></div>
    </div>

    <div id="elements" class="elements">
      <div id="1">1</div>
      <div id="2">2</div>
      <div id="3">3</div>
    </div>

    <div id="console" class="console"></div>

    <button id="settingsGearBtn" type="button" aria-label="Open settings">&#9881;</button>

    <div id="settingsPanel">
      <button id="settingsCloseBtn" type="button" aria-label="Close settings">&#10005;</button>
      <div id="settingsPanelContent">
        <h2>Settings</h2>

        <div class="speed-control">
          <label>WPM</label>
          <div class="ctrl-group">
            <button id="wpmMinus" type="button" aria-label="Decrease WPM">&minus;</button>
            <span id="wpmValue" class="value">8</span>
            <button id="wpmPlus" type="button" aria-label="Increase WPM">+</button>
          </div>
        </div>

        <div class="speed-control">
          <label>Word gap (ms)</label>
          <div class="ctrl-group">
            <button id="wordGapMinus" type="button" aria-label="Decrease word gap">&minus;</button>
            <span id="wordGapValue" class="value">1050</span>
            <button id="wordGapPlus" type="button" aria-label="Increase word gap">+</button>
          </div>
        </div>
      </div>
    </div>

    <script src="./cw_snippets.js"></script>
    <script src="./simon-game-logic.js"></script>
    <script src="./pt-cwsimon.js"></script>
  </body>
</html>
